---
# Pre-commit FIX variant — every hook here MODIFIES files. Per
# the agent contract in `~/.claude/rules/pre-commit.md`, agents
# MUST NOT apply these without explicit user approval.
#
# Not auto-invoked by `pre-commit install`; run explicitly:
#
#   pre-commit run --config .pre-commit-config-fix.yaml --all-files
#
# Or for a single hook:
#
#   pre-commit run --config .pre-commit-config-fix.yaml --all-files <hook-id>
#
# Each cleanup area should be applied and committed as its own
# focused PR.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: mixed-line-ending

  - repo: local
    hooks:
      - id: gofmt-fix
        name: gofmt -w
        entry: gofmt -w
        language: system
        types: [go]

      # Requires `go install golang.org/x/tools/cmd/goimports@latest`.
      - id: goimports-fix
        name: goimports -w
        entry: goimports -w
        language: system
        types: [go]

      - id: go-mod-tidy-fix
        name: go mod tidy
        entry: go mod tidy
        language: system
        pass_filenames: false
        files: '(^go\.(mod|sum)$|\.go$)'
