---
# Default pre-commit hooks. Runs on `git commit` after `pre-commit
# install`.
#
# CHECKS ONLY — per the agent contract in
# `~/.claude/rules/pre-commit.md`, this file MUST NOT contain any
# hook that modifies the working tree. Hooks that would change
# files (formatters, fixers) live in `.pre-commit-config-fix.yaml`
# and are invoked explicitly when the user wants fixes applied.
#
# Hooks here that would currently fail on the repo (gofmt drift,
# go vet warnings, etc.) are placed in `stages: [manual]` so a
# normal `git commit` doesn't break. Surface them on demand with:
#
#   pre-commit run --all-files --hook-stage manual
#
# When the corresponding cleanup lands upstream and on `mine`,
# remove `stages: [manual]` from the hook so it gates future
# commits.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # All check-only — these hooks scan and report, they do
      # not modify files.
      - id: no-commit-to-branch
        args: ['--branch', 'main', '--branch', 'master']
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-toml
      - id: check-yaml

  - repo: local
    hooks:
      # gofmt -l prints the names of files that would be
      # reformatted but does NOT modify them. Non-empty output is
      # treated as a check failure. Manual until a repo-wide
      # `go fmt ./...` cleanup lands.
      - id: gofmt
        name: gofmt (check only)
        entry: bash -c 'out=$(gofmt -l "$@"); if [ -n "$out" ]; then echo "$out" >&2; exit 1; fi' --
        language: system
        types: [go]
        stages: [manual]

      # goimports -l: same idea, with additional import
      # grouping / ordering check. Requires
      # `go install golang.org/x/tools/cmd/goimports@latest`.
      # Manual until a goimports cleanup lands.
      - id: goimports
        name: goimports (check only)
        entry: bash -c 'out=$(goimports -l "$@"); if [ -n "$out" ]; then echo "$out" >&2; exit 1; fi' --
        language: system
        types: [go]
        stages: [manual]

      # `go vet` reports issues to stderr and exits non-zero on
      # any finding; it does not modify files. Manual until any
      # flagged issues are cleared.
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [manual]

      # `go mod tidy -diff` (Go 1.23+) prints what `go mod tidy`
      # would change without applying it; non-zero exit when there
      # is drift. This is the check-only counterpart to running
      # `go mod tidy` outright. Manual until any drift is cleared.
      - id: go-mod-tidy-check
        name: go mod tidy -diff (no drift)
        entry: go mod tidy -diff
        language: system
        pass_filenames: false
        files: '(^go\.(mod|sum)$|\.go$)'
        stages: [manual]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      # yamllint reads files and reports problems; it does not
      # modify them. Manual until the existing
      # `.github/workflows/*.yml` files are brought into line.
      - id: yamllint
        stages: [manual]
