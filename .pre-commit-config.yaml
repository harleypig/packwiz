---
# Default pre-commit hooks. Runs on `git commit` after `pre-commit
# install`.
#
# Hooks that would fail on the existing codebase (formatting drift,
# linter warnings, etc.) are placed in `stages: [manual]` so a normal
# commit doesn't break. They can be invoked on demand to surface the
# issues:
#
#   pre-commit run --all-files --hook-stage manual
#
# When a specific cleanup PR lands (e.g. a repo-wide `go fmt`),
# remove `stages: [manual]` from the corresponding hook so it
# gates future commits.

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      # Active — should pass on the existing codebase today.
      - id: check-merge-conflict
      - id: check-added-large-files
      - id: check-case-conflict
      - id: detect-private-key
      - id: check-toml
      - id: check-yaml

      # Manual until a whitespace-cleanup PR normalises the repo.
      - id: end-of-file-fixer
        stages: [manual]
      - id: trailing-whitespace
        stages: [manual]
      - id: mixed-line-ending
        stages: [manual]

  - repo: local
    hooks:
      # gofmt -l prints the names of files that would be reformatted;
      # non-empty output is treated as a check failure.
      # Manual until a repo-wide `go fmt ./...` cleanup lands.
      - id: gofmt
        name: gofmt
        entry: bash -c 'out=$(gofmt -l "$@"); if [ -n "$out" ]; then echo "$out" >&2; exit 1; fi' --
        language: system
        types: [go]
        stages: [manual]

      # goimports -l adds the import-grouping/ordering check on top
      # of gofmt. Requires `go install golang.org/x/tools/cmd/goimports@latest`.
      # Manual until a goimports cleanup lands.
      - id: goimports
        name: goimports
        entry: bash -c 'out=$(goimports -l "$@"); if [ -n "$out" ]; then echo "$out" >&2; exit 1; fi' --
        language: system
        types: [go]
        stages: [manual]

      # `go vet` runs the high-confidence subset by default; the
      # extended subset (`-vet=all` style) catches more but also
      # generates more noise. Manual until any flagged issues are
      # cleared.
      - id: go-vet
        name: go vet
        entry: go vet ./...
        language: system
        pass_filenames: false
        types: [go]
        stages: [manual]

      # Fails when `go mod tidy` would modify go.mod or go.sum,
      # catching "I forgot to tidy" PRs. Manual for now in case
      # the existing repo state has any drift.
      - id: go-mod-tidy-check
        name: go mod tidy (no drift)
        entry: bash -c 'go mod tidy && git diff --exit-code go.mod go.sum'
        language: system
        pass_filenames: false
        files: '(^go\.(mod|sum)$|\.go$)'
        stages: [manual]

  - repo: https://github.com/adrienverge/yamllint
    rev: v1.35.1
    hooks:
      # Manual until the existing .github/workflows/*.yml files have
      # been brought into line with the desired yamllint config.
      - id: yamllint
        stages: [manual]
